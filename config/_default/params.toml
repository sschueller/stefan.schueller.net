# Sponsor config
# 赞助设置
[sponsor]
  enable = false
  bio = "If you find this post helpful, please consider sponsoring."
  link = "https://github.com/sponsors/sschueller"
  # custom = "<a href=\"https://www.buymeacoffee.com/PCloud\" target=\"_blank\"><img src=\"https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png\" alt=\"Buy Me A Coffee\" style=\"height: 40px !important;width: 145 !important;\" ></a>"
[page]

  rssFullText = false
  # whether to enable series navigation
  # 是否使用系列导航
  seriesNavigation = true
  # whether to enable last modified time
  # 是否启用最后修改时间
  enableLastMod = true
  # whether to enable word count
  # 是否启用字数统计
  enableWordCount = true
  # whether to enable reading time estimation
  # 是否启用阅读时间估计
  enableReadingTime = true

  [page.toc]
    # whether to enable the table of the contents
    # 是否使用目录
    enable = true
    # whether to keep the static table of the contents in front of the post
    # 是否保持使用文章前面的静态目录
    keepStatic = false
    # whether to make the table of the contents in the sidebar automatically collapsed
    # 是否使侧边目录自动折叠展开
    auto = true

  [page.code]
    # the maximum number of lines of displayed code by default
    # 默认展开显示的代码行数
    maxShownLines = 150
    # whether to enable line numbers in the code block
    # 是否显示代码行号
    lineNos = true
    # whether to enable line wrapping in the code block
    # 是否开启代码换行
    wrap = false
    # whether to display the header in the code block
    # 是否显示代码块标题
    header = true

  [page.share]
    enable = true
    Baidu = true
    Blogger = true
    Buffer = false
    Digg = false
    Evernote = true
    Facebook = true
    Flipboard = false
    HackerNews = true
    Instapaper = false
    Line = true
    Linkedin = true
    Mix = false
    Myspace = false
    Odnoklassniki = false
    Pinterest = false
    Pocket = true
    Reddit = true
    Renren = false
    Skype = true
    Stumbleupon = false
    Telegram = true
    Trello = true
    Tumblr = true
    Twitter = true
    VK = true
    Weibo = true
    Weixin = ""
    Whatsapp = true
    Xing = true
    Mastodon = true

  [page.comment]
    enable = true

    [page.comment.utterances]
      enable = true
      # owner/repo
      repo = "sschueller/sschueller.github.io"
      issueTerm = "pathname"
      label = "Comment"
      lightTheme = "github-light"
      darkTheme = "github-dark"

[analytics]
  enable = true
  [analytics.matomo]
    enable = true
    # matomo server URL
    server = "https://stats2.tei.li/"
    # matomo site ID
    site_id = 1
    # enable no js tracking
    Track_no_js = true
    # no cookie mode
    # 无cookie模式
    No_cookie = true
    # respect the do not track setting of the browser
    # 遵循浏览器的”要求网站不跟踪我“设定
    Do_not_track = true

  [analytics.umami]
    data_website_id = "5722978f-b38f-4a9f-a1bf-a6b72f71388d"
    src = "https://s.tei.li/script.js"
